
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 4
    border_size = 0
    col.active_border = rgba(b877dbff)
    col.inactive_border = rgba(232530ff)

    layout = dwindle # dwindle / master

    resize_on_border = true
    extend_border_grab_area = 25

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 8

    drop_shadow = false
    
    blur {
        enabled = true
        size = 4
        passes = 1
        # xray = true
    }

}

group {
    # col.border_active = 
    # col.border_inactive = 
    # col.border_locked_active = 
    # col.border_locked_inactive = 

    groupbar {
        enabled = true
        font_family = DejaVu Sans
        gradients = false
        render_titles = false

        text_color = rgb(1c1e26)
        col.active = rgb(e3e6ee)
        col.inactive = rgba(e3e6ee80)
        col.locked_active = rgb(e95678)
        col.locked_inactive = rgba(e9567880)
    }
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = false
}
