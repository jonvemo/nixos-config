format = """
[оӮ¶](white)\
$cmd_duration\
[оӮҙ](white)\
"""

# оӮІ оӮ¶

right_format = """
[оӮ¶](black)\
$c\
$golang\
$java\
$nodejs\
$rust\
[оӮІ](fg:white bg:black)\
$git_branch\
$git_status\
[оӮІ](fg:black bg:white)\
$directory\
[оӮІ](fg:white bg:black)\
$username\
[оӮҙ](white)\
"""

# Disable the blank line at the start of the prompt
add_newline = false

# Set 'foo' as custom color palette
palette = 'monochrome'

[palettes.monochrome]
#e3e6ee 
white = '#cbced0'
black = '#2e303e'

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:black bg:white"
style_root = "fg:black bg:white"
format = "[ $user ](bold $style)"
disabled = false

[directory] # Black
style = "fg:white bg:black"
format = "[ $path ]($style)"
truncation_length = 2
home_symbol = " пҖ• "
fish_style_pwd_dir_length = 3 # NOTE No funciona

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " у°Ҳҷ "
"Downloads" = " пҖҷ "
"Music" = " пҖҒ "
"Pictures" = " пҖҫ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " у°Ҳҷп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important у°Ҳҷ " = " у°Ҳҷп„Ә "

[git_branch]
symbol = "пҗҳ"
style = "fg:black bg:white"
format = '[ $branch $symbol ](bold $style)'

[git_status]
style = "fg:black bg:white"
format = '[ $all_status $ahead_behind ]($style)'

[c] # Black
symbol = "оҳһ"
style = "fg:white bg:black"
format = '[ ($version) $symbol  ]($style)'

[golang]
symbol = "оҳ§"
style = "fg:white bg:black"
format = '[ ($version) $symbol  ]($style)'

[java]
symbol = "оү–"
style = "fg:white bg:black"
format = '[ ($version) $symbol  ]($style)'

[nodejs]
symbol = "оңҳ"
style = "fg:white bg:black"
format = '[ ($version) $symbol  ]($style)'

[rust]
symbol = "оһЁ"
style = "fg:white bg:black"
format = '[ ($version) $symbol  ]($style)'

[cmd_duration]
disabled = false
style = "bg:white"
format = 'Took [$duration]($style) '
show_milliseconds = true
