# Disable the blank line at the start of the prompt
add_newline = false

# Set 'foo' as custom color palette
palette = 'monochrome'

[palettes.monochrome]
white = '#e3e6ee'
black = '#2e303e'

# You can also replace your username with a neat symbol like ´äá  or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:black bg:white"
style_root = "fg:black bg:white"
format = '[$user ](bold $style)'
disabled = false

[directory] # Black
style = "fg:white bg:black"
format = "[ $path ]($style)"
truncation_length = 2
home_symbol = "´Çò "
# fish_style_pwd_dir_length = 1 # NOTE No funciona

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░êÖ´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░êÖ " = " ¾░êÖ´ä¬ "

[git_branch]
symbol = "´Éİ"
style = "fg:black bg:white"
format = '[ $symbol $branch ](bold $style)'

[git_status]
style = "fg:black bg:white"
format = '[ $all_status $ahead_behind ](bold $style)'

