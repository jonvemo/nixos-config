############################################################
# +------------------------------------------------------+ #
# |                       Notas                          | #
# +------------------------------------------------------+ #
############################################################

# Este es el archivo de configuración para EssentialsX.
# Esta configuración fue generada para la versión 2.21.2.
# Consulta la configuración predeterminada actualizada en https://git.io/JG4z1
# Si necesitas ayuda, puedes unirte a la comunidad de EssentialsX: https://essentialsx.net/community.html

############################################################
# +------------------------------------------------------+ #
# |                 EssentialsX (Global)                 | #
# +------------------------------------------------------+ #
############################################################

# Un código de color entre 0-9 o a-f. Establécelo en 'none' para deshabilitar.
# En 1.16+, también puedes usar códigos de color hexadecimales aquí (por ejemplo, #613e1d es marrón).
ops-name-color: '4'

# Los caracteres que prefijan todos los apodos, para que sepas que no son nombres de usuario verdaderos.
# Los jugadores con 'essentials.nick.hideprefix' no serán prefijados con los caracteres.
nickname-prefix: ''

# La longitud máxima permitida en los apodos. El prefijo del apodo no se incluye en esto.
max-nick-length: 15

# El patrón de regex usado para determinar si un apodo solicitado debe ser permitido.
# Si el apodo solicitado no coincide con este patrón, el apodo será rechazado.
# Los jugadores con 'essentials.nick.allowunsafe' podrán omitir esta comprobación.
allowed-nicks-regex: '^[a-zA-Z_0-9§]+$'

# Una lista de frases que no se pueden usar en apodos. Puedes incluir expresiones regulares aquí.
# Los jugadores con 'essentials.nick.blacklist.bypass' podrán omitir este filtro.
nick-blacklist:
  # - Notch

# Cuando esta opción está habilitada, la comprobación de la longitud del apodo excluirá los códigos de color en los nombres de los jugadores.
# Por ejemplo, si "&6Notch" tiene 7 caracteres (2 son parte de un código de color), se usa una longitud de 5 cuando esta opción se establece en verdadero.
ignore-colors-in-max-nick-length: false

# Cuando esta opción está habilitada, los nombres de visualización para jugadores ocultos no se mostrarán. Esto evita que los jugadores puedan
# ver que están en línea mientras están invisibles.
hide-displayname-in-vanish: true

# Deshabilita esto si tienes cualquier otro plugin que modifique el nombre de visualización de un jugador.
change-displayname: true

# Esta opción hará que Essentials muestre los nombres de visualización de los jugadores en lugar de los nombres de usuario al autocompletar comandos de Essentials.
# Si tus autocompletados de tabulación incluyen prefijos y sufijos, establece esta opción en falso.
change-tab-complete-name: false

# Si el destino del teletransporte no es seguro, ¿deberían los jugadores ser teletransportados a la ubicación segura más cercana?
# Si esto se establece en true, Essentials intentará teletransportar a los jugadores cerca del destino previsto.
# Si esto se establece en false, los intentos de teletransportes a ubicaciones inseguras serán cancelados con una advertencia.
teleport-safety: true

# Esto deshabilita forzosamente las comprobaciones de seguridad de teletransporte sin una advertencia si se intenta teletransportar a ubicaciones inseguras.
# Tanto 'teleport-safety' arriba como esta opción deben estar en true para forzar la teletransportación a ubicaciones peligrosas.
force-disable-teleport-safety: false

# Si un jugador se teletransporta a una ubicación insegura en modo creativo, aventura o dios, no será teletransportado a una
# ubicación segura. Si quieres que los jugadores sean teletransportados a una ubicación segura todo el tiempo, establece esta opción en true.
force-safe-teleport-location: false

# Considerar los bloques de agua como "seguros", permitiendo así a los jugadores teletransportarse
# usando comandos como /home o /spawn a una ubicación ocupada por bloques de agua.
is-water-safe: true

# Si un jugador tiene pasajeros, el teletransporte fallará. ¿Deberían sus pasajeros ser desmontados antes de ser teletransportados?
# Si esto se establece en true, Essentials desmontará a los pasajeros del jugador antes de teletransportarse.
# Si esto se establece en false, los intentos de teletransporte serán cancelados con una advertencia.
teleport-passenger-dismount: true

# El retraso, en segundos, requerido entre /home, /tp, etc.
teleport-cooldown: 0

# El retraso, en segundos, antes de que un jugador se teletransporte realmente.
# Si el jugador se mueve o es atacado en este plazo, el teletransporte se cancela.
teleport-delay: 4

# El retraso, en segundos, durante el cual un jugador no puede ser atacado por otros jugadores después de ser teletransportado por un comando.
# Esto también evita que el jugador ataque a otros.
teleport-invulnerability: 4

# Si todas las teletransportaciones deben ir al centro del bloque, donde las coordenadas x y z se convierten en .5.
teleport-to-center: true

# El retraso, en segundos, requerido entre intentos de /heal o /feed.
heal-cooldown: 90

# ¿Deben eliminarse los efectos de poción al curar a un jugador?
remove-effects-on-heal: true

# El radio predeterminado cuando se usa /near.
near-radius: 200

# Qué impedir de /item y /give.
# Ejemplo: item-spawn-blacklist: lava_bucket,tnt,end_crystal
item-spawn-blacklist:

# Establece esto en true si quieres reglas de aparición de objetos basadas en permisos.
# Nota: 'item-spawn-blacklist' arriba será ignorado si se establece en true.
# Ejemplos de permisos (estos van en tu administrador de permisos):
#  - essentials.itemspawn.item-all
#  - essentials.itemspawn.item-[nombre_del_objeto]
#  - essentials.give.item-all
#  - essentials.give.item-[nombre_del_objeto]
#  - essentials.unlimited.item-all
#  - essentials.unlimited.item-[nombre_del_objeto]
#  - essentials.unlimited.item-waterbucket (Colocación ilimitada de agua)
#
# Para más información, visita https://wiki.ess3.net/wiki/Command_Reference/ICheat#Item.2FGive
permission-based-item-spawn: false

# El número máximo de entidades que pueden ser generadas por cada uso del comando /spawnmob.
spawnmob-limit: 8

# ¿Debe Essentials notificar a los jugadores "golpeados" cuando se usa /lightning?
warn-on-smite: false

# ¿Deben los objetos caer a los pies de un jugador si su inventario está lleno en lugar de no dar los objetos?
drop-items-if-full: false

# ¿Debe Essentials notificar a los jugadores si no tienen correo nuevo?
notify-no-new-mail: false

# Especifica la duración del cooldown, en segundos, entre las notificaciones de correo para un jugador.
# Útil para servidores con mucho tráfico de correo.
notify-player-of-mail-cooldown: 60

# Cuando un comando entra en conflicto con otro plugin, Essentials, por defecto, intentará forzar que el OTRO plugin tenga prioridad.
# Añadir comandos a esta lista le dirá a Essentials que no "ceda" el comando a otros plugins.
# En este estado, qué plugin "gana" puede parecer casi aleatorio.
#
# Si tienes dos plugins con el mismo comando y quieres forzar a Essentials a tomar el control, debes establecer un alias.
# Para forzar a Essentials a manejar '/god', alias 'god' a 'essentials:god $1-' en el archivo 'commands.yml' ubicado en la carpeta raíz de tu servidor.
# Consulta https://breezewiki.com/bukkit/wiki/Commands.yml#aliases para más información.
overridden-commands:
  #- god
  #- info

# Deshabilitar comandos aquí evitará que Essentials maneje el comando; esto no afectará los conflictos de comandos.
# No deberías necesitar deshabilitar comandos usados por otros plugins, ya que automáticamente obtendrán prioridad.
# Consulta https://breezewiki.com/bukkit/wiki/Commands.yml#aliases para mapear comandos a otros plugins.
disabled-commands:
  #- nick
  #- clear
  # 

# Si Essentials debe mostrar usos detallados de los comandos.
# Si se establece en false, Essentials agrupará todos los usos en un único mensaje de uso.
verbose-command-usages: true

# Estos comandos se mostrarán a los jugadores con SocialSpy habilitado.
# Puedes añadir comandos de otros plugins para rastrear.
# Elimina cualquier comando que no quieras espiar.
# Elimina el # de '*' para escuchar todos los comandos posibles.
socialspy-commands:
  #- '*'
  - action
  - describe
  - eaction
  - edescribe
  - email
  - eme
  - emsg
  - er
  - ereply
  - etell
  - ewhisper
  - m
  - mail
  - msg
  - pm
  - r
  - reply
  - t
  - tell
  - w
  - whisper

# Si los mensajes privados y públicos de jugadores silenciados deben aparecer en SocialSpy.
# Si es true, se diferenciarán de los mensajes enviados por jugadores normales.
socialspy-listen-muted-players: true

# Si SocialSpy debe espiar mensajes privados además de los comandos de la lista anterior.
# Si es false, solo monitoreará los comandos de la lista anterior.
socialspy-messages: true

# Si SocialSpy debe usar nombres de visualización formateados, que pueden incluir color.
# Si es false, usará solo los nombres reales de los jugadores.
socialspy-uses-displaynames: true

# Las siguientes configuraciones de mundo escuchan cuando un jugador cambia de mundo.
# Si usas otro plugin para controlar la velocidad y el vuelo, deberías cambiarlas a false.

# Cuando un jugador cambia de mundo, ¿debe Essentials resetear su vuelo?
# Esto deshabilitará el vuelo si el jugador no tiene 'essentials.fly'.
world-change-fly-reset: true

# A partir de la 1.17, Minecraft ya no conserva las habilidades de un jugador cuando cambia de mundo.
# Al establecer esto en true, Essentials conservará el estado de vuelo de un jugador cuando cambie de mundo.
# Esto solo funcionará si el jugador tiene el permiso 'essentials.fly'.
world-change-preserve-flying: true

# Cuando un jugador cambia de mundo, ¿debe Essentials resetear su velocidad según sus permisos?
# Esto resetea la velocidad del jugador al valor predeterminado si no tiene 'essentials.speed'.
# Si el jugador no tiene 'essentials.speed.bypass', su velocidad se reseteará a los valores máximos
# especificados en 'max-walk-speed' y 'max-fly-speed' a continuación.
world-change-speed-reset: true

# Estos comandos serán deshabilitados cuando un jugador esté silenciado.
# Essentials ya deshabilita los comandos de mensajería de Essentials por defecto.
# Solo le importa el comando raíz, no los argumentos posteriores (ve '/f chat' igual que '/f').
# Quita el # de '*' para deshabilitar todos los comandos mientras esté silenciado.
mute-commands:
  #- '*'
  - kittycannon

# Si no deseas usar un sistema de permisos, puedes definir una lista de "permisos de jugador" a continuación.
# Esta lista no tiene efecto si estás utilizando un sistema de permisos compatible.
# Si estás utilizando un sistema de permisos no compatible, simplemente elimina esta sección.
# Lista blanca los comandos y permisos que deseas dar a los jugadores por defecto (todo lo demás es solo para OP).
# Estos son los permisos sin la parte 'essentials.'.
#
# Para habilitar esta característica, asegúrate de que 'use-bukkit-permissions' a continuación esté establecido en false.
